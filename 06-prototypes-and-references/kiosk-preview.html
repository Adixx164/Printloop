<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrintLoop Kiosk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Sora',sans-serif;background:#07111d;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccdce9;padding:24px;position:relative;}
  @keyframes kspin{to{transform:rotate(360deg);}}
  @keyframes kpulse{0%,100%{opacity:1}50%{opacity:.35}}
  @keyframes kpop{0%{transform:scale(.4);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
  @keyframes kblink{0%,100%{opacity:1}50%{opacity:0}}
  @keyframes kslide{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
  .ksc{animation:kslide .25s ease;width:100%;display:flex;flex-direction:column;align-items:center;}
  .kbox{width:58px;height:70px;border:2px solid #1a3045;border-radius:10px;background:#0a1828;display:flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:28px;font-weight:500;color:#eaf2f8;transition:border-color .15s,background .15s;position:relative;}
  .kbox.f{border-color:#2d6a99;background:#0d2038;}
  .kbox.a{border-color:#3a9fd1;background:#0f2540;}
  .kbox.a::after{content:'';position:absolute;width:2px;height:32px;background:#3a9fd1;border-radius:1px;animation:kblink 1s step-end infinite;}
  .kkey{min-width:42px;height:48px;border:1.5px solid #1a3045;border-radius:8px;background:#0e1e2e;color:#ccdce9;font-family:'Sora',sans-serif;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;flex:1 0 auto;transition:background .1s,border-color .1s;user-select:none;}
  .kkey:hover{background:#162738;border-color:#225275;}
  .kkey:active{transform:scale(.96);}
  .kdel{flex:1.6 0 auto;background:#162736;font-size:17px;}
  .spec{background:#071525;border-radius:10px;padding:11px 13px;}
  .kbp{background:#225275;color:#eaf2f8;border:none;border-radius:10px;padding:14px 28px;font-size:15px;font-weight:600;cursor:pointer;width:100%;font-family:'Sora',sans-serif;letter-spacing:.02em;transition:background .15s;}
  .kbp:hover{background:#2d6a99;}
  .kbs{background:transparent;color:#527a95;border:1.5px solid #1a3045;border-radius:10px;padding:12px 28px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Sora',sans-serif;transition:border-color .15s,color .15s;}
  .kbs:hover{color:#ccdce9;border-color:#527a95;}
  .kcard{background:#0e1e2e;border:1px solid #1a3045;border-radius:16px;padding:24px 28px;width:100%;max-width:640px;}
  select.ksel{background:#071525;color:#ccdce9;border:1.5px solid #1a3045;border-radius:8px;padding:9px 12px;font-family:'Sora',sans-serif;font-size:13px;width:100%;cursor:pointer;}
  select.ksel:focus{outline:none;border-color:#225275;}
  .odot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;margin-right:6px;vertical-align:middle;}
  .step-ind{display:flex;align-items:center;gap:6px;margin-bottom:28px;}
  .step-dot{width:8px;height:8px;border-radius:50%;background:#1a3045;transition:background .2s;}
  .step-dot.done{background:#225275;}
  .step-dot.cur{background:#3a9fd1;}
  .pdf-frame{width:100%;height:340px;border:1px solid #1a3045;border-radius:12px;background:#071525;overflow:hidden;position:relative;}
  #logo{position:fixed;top:18px;left:24px;display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600;letter-spacing:.1em;color:#3a9fd1;}
  #pbadge{position:fixed;top:18px;right:24px;font-size:12px;color:#527a95;display:flex;align-items:center;gap:5px;}
</style>
</head>
<body>
<div id="logo">
  <svg width="24" height="24" viewBox="0 0 26 26" fill="none"><rect width="26" height="26" rx="6" fill="#225275"/><polyline points="6,18 6,10 13,6 20,10 20,18" stroke="#eaf2f8" stroke-width="1.8" stroke-linejoin="round" fill="none"/><rect x="9" y="14" width="8" height="7" rx="1.5" stroke="#eaf2f8" stroke-width="1.6" fill="none"/></svg>
  PRINTLOOP
</div>
<div id="pbadge"></div>
<div id="sc"></div>

<script>
const PL = window.printloop || {
  validateCode: async c => { await new Promise(r=>setTimeout(r,1300)); if(c==='AB1234') return {valid:true,jobNumber:1042}; return {valid:false,message:'Code not found or payment not completed.'}; },
  getJob: async () => { await new Promise(r=>setTimeout(r,700)); return {jobNumber:1042,fileName:'Research_Paper_Q3_2025.pdf',fileURL:'https://www.africau.edu/images/default/sample.pdf',printConfiguration:{paperSize:'A4',orientation:'portrait',copies:2,colorType:'black_white',duplex:'double_sided_long_edge',resolution:600,staple:true,pageRange:'1-12'},cost:850,customerInfo:{email:'ab***@gmail.com',fullName:'Abdurrahman'}}; },
  getPrinters: async () => [{name:'HP LaserJet Pro M404n',isDefault:true},{name:'Epson L3250',isDefault:false}],
  printJob: async () => { await new Promise(r=>setTimeout(r,3200)); return {success:true}; }
};

const KEYS=[['1','2','3','4','5','6','7','8','9','0'],['Q','W','E','R','T','Y','U','I','O','P'],['A','S','D','F','G','H','J','K','L'],['Z','X','C','V','B','N','M','⌫']];
const dDuplex=d=>({'single_sided':'Single sided','double_sided_long_edge':'Double sided (long edge)','double_sided_short_edge':'Double sided (short edge)'}[d]||d);
const dColor=c=>c==='color'?'Color':'Black & White';
const dOri=o=>o==='landscape'?'Landscape':'Portrait';
const fmt=n=>n!=null?`₦${Number(n).toLocaleString('en-NG',{minimumFractionDigits:2})}`:null;

let S={screen:'idle',code:'',job:null,printers:[],sel:'',err:''};

function stepIdx(s){return{idle:0,validating:0,preview:1,summary:2}[s]??-1;}
const STEP_LABELS=['Enter code','Preview','Confirm'];

function dots(s){
  const idx=stepIdx(s);
  if(idx<0) return '';
  return `<div class="step-ind">${[0,1,2].map(i=>`<div class="step-dot${i<idx?' done':i===idx?' cur':''}"></div>`).join('')}<span style="font-size:11px;color:#527a95;margin-left:4px;">${STEP_LABELS[idx]}</span></div>`;
}

const screens={
  idle:()=>`
    <div class="ksc" style="max-width:560px;align-items:center;">
      ${dots('idle')}
      <h1 style="font-size:24px;font-weight:300;color:#eaf2f8;margin-bottom:5px;text-align:center;">Enter your pickup code</h1>
      <p style="font-size:13px;color:#527a95;margin-bottom:32px;text-align:center;">You received this after completing payment</p>
      <div style="display:flex;gap:9px;margin-bottom:32px;">
        ${Array.from({length:6}).map((_,i)=>{const f=!!S.code[i];const a=i===S.code.length&&i<6;return `<div class="kbox${f?' f':''}${a?' a':''}">${S.code[i]||''}</div>`;}).join('')}
      </div>
      <div style="width:100%;max-width:500px;display:flex;flex-direction:column;gap:6px;">
        ${KEYS.map(row=>`<div style="display:flex;gap:5px;justify-content:center;">${row.map(k=>`<button class="kkey${k==='⌫'?' kdel':''}" data-k="${k}">${k==='⌫'?'⌫':k}</button>`).join('')}</div>`).join('')}
      </div>
      ${S.code.length>0?`<div style="display:flex;gap:10px;margin-top:20px;width:100%;max-width:500px;">
        <button class="kbs" id="clr" style="width:auto;padding:11px 22px;">Clear</button>
        ${S.code.length===6?`<button class="kbp" id="sub">Check Code →</button>`:`<div style="flex:1;display:flex;align-items:center;justify-content:center;font-size:13px;color:#527a95;">${6-S.code.length} more character${6-S.code.length>1?'s':''}</div>`}
      </div>`:''}
    </div>`,

  validating:()=>`
    <div class="ksc" style="align-items:center;text-align:center;">
      <div style="width:60px;height:60px;border:3px solid #1a3045;border-top-color:#3a9fd1;border-radius:50%;animation:kspin .9s linear infinite;margin-bottom:20px;"></div>
      <p style="font-size:18px;color:#ccdce9;">Checking code <span style="font-family:'DM Mono',monospace;color:#3a9fd1;">${S.code}</span>…</p>
    </div>`,

  preview:()=>`
    <div class="ksc" style="max-width:640px;">
      ${dots('preview')}
      <div class="kcard">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;">
          <div style="overflow:hidden;">
            <p style="font-size:15px;font-weight:600;color:#eaf2f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${S.job?.fileName||''}</p>
            <p style="font-size:12px;color:#527a95;margin-top:2px;">Job #${S.job?.jobNumber} · ${S.job?.customerInfo?.email||''}</p>
          </div>
          <div style="flex-shrink:0;background:#071525;border-radius:8px;padding:6px 14px;font-family:'DM Mono',monospace;font-size:12px;color:#3a9fd1;white-space:nowrap;">CODE: ${S.code}</div>
        </div>
        <div style="height:1px;background:#1a3045;margin-bottom:14px;"></div>
        <p style="font-size:11px;color:#527a95;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Document Preview</p>
        <div class="pdf-frame">
          <iframe src="${S.job?.fileURL||''}" style="width:100%;height:100%;border:none;" title="Document preview"></iframe>
        </div>
        <div style="margin-top:14px;display:flex;gap:8px;">
          <button class="kbs" id="back-idle" style="width:auto;padding:11px 20px;">← Back</button>
          <button class="kbp" id="go-summary">Looks Good — Review & Print →</button>
        </div>
      </div>
    </div>`,

  summary:()=>{
    const cfg=S.job?.printConfiguration||{};
    const specs=[['Paper',cfg.paperSize],['Copies',cfg.copies],['Color',dColor(cfg.colorType)],['Orientation',dOri(cfg.orientation)],['Duplex',dDuplex(cfg.duplex)],['Pages',cfg.pageRange&&cfg.pageRange!=='all'?cfg.pageRange:'All'],['Resolution',cfg.resolution?cfg.resolution+'dpi':'—'],['Staple',cfg.staple?'Yes':'No']];
    const cost=fmt(S.job?.cost);
    return `
    <div class="ksc" style="max-width:640px;">
      ${dots('summary')}
      <div class="kcard">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
          <div style="width:40px;height:40px;background:#225275;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#e0f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2v-5a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg>
          </div>
          <div style="overflow:hidden;">
            <p style="font-size:15px;font-weight:600;color:#eaf2f8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${S.job?.fileName||''}</p>
            <p style="font-size:12px;color:#527a95;">Job #${S.job?.jobNumber}</p>
          </div>
          ${cost?`<div style="margin-left:auto;flex-shrink:0;background:#071525;border-radius:10px;padding:8px 16px;text-align:center;"><p style="font-size:10px;color:#527a95;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px;">Total</p><p style="font-family:'DM Mono',monospace;font-size:18px;font-weight:500;color:#3a9fd1;">${cost}</p></div>`:''}
        </div>
        <div style="height:1px;background:#1a3045;margin-bottom:14px;"></div>
        <p style="font-size:11px;color:#527a95;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;">Print Configuration</p>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
          ${specs.map(([l,v])=>`<div class="spec"><div style="font-size:10px;color:#527a95;text-transform:uppercase;letter-spacing:.08em;margin-bottom:3px;">${l}</div><div style="font-size:13px;font-weight:500;color:#eaf2f8;">${v||'—'}</div></div>`).join('')}
        </div>
        <div style="height:1px;background:#1a3045;margin-bottom:14px;"></div>
        <p style="font-size:11px;color:#527a95;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;">Print to</p>
        <select class="ksel" id="psel">
          ${S.printers.map(p=>`<option value="${p.name}"${p.name===S.sel?' selected':''}>${p.name}</option>`).join('')}
        </select>
        <div style="background:#071525;border:1px solid #1a3045;border-radius:8px;padding:10px 14px;margin-top:10px;display:flex;align-items:flex-start;gap:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#527a95" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:2px;"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <p style="font-size:12px;color:#527a95;line-height:1.6;">Payment was already collected. This will print immediately once you confirm.</p>
        </div>
        <div style="margin-top:14px;display:flex;gap:8px;">
          <button class="kbs" id="back-preview" style="width:auto;padding:11px 20px;">← Back</button>
          <button class="kbp" id="confirm-print">Confirm & Print</button>
        </div>
      </div>
    </div>`;},

  printing:()=>`
    <div class="ksc" style="align-items:center;text-align:center;">
      <div style="position:relative;width:76px;height:76px;margin-bottom:24px;">
        <div style="position:absolute;inset:0;border:3px solid #1a3045;border-top-color:#225275;border-radius:50%;animation:kspin 1.1s linear infinite;"></div>
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:36px;height:36px;background:#225275;border-radius:9px;display:flex;align-items:center;justify-content:center;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,9 6,2 18,2 18,9"/><path d="M6,18H4a2,2,0,0,1-2-2v-5a2,2,0,0,1,2-2H20a2,2,0,0,1,2,2v5a2,2,0,0,1-2,2H18"/><rect x="6" y="14" width="12" height="8"/></svg>
        </div>
      </div>
      <h2 style="font-size:22px;font-weight:300;color:#eaf2f8;margin-bottom:8px;">Printing your document</h2>
      <p style="font-size:13px;color:#527a95;animation:kpulse 2s infinite;">Please do not leave the kiosk</p>
      ${S.job?`<p style="font-family:'DM Mono',monospace;font-size:11px;color:#3a9fd1;margin-top:14px;">JOB #${S.job.jobNumber}</p>`:''}
    </div>`,

  success:()=>`
    <div class="ksc" style="align-items:center;text-align:center;max-width:400px;">
      <div style="width:76px;height:76px;border-radius:50%;background:#071f10;border:2px solid #22c55e;display:flex;align-items:center;justify-content:center;margin-bottom:22px;animation:kpop .5s cubic-bezier(0.34,1.56,0.64,1) forwards;">
        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20,6 9,17 4,12"/></svg>
      </div>
      <h2 style="font-size:24px;font-weight:300;color:#eaf2f8;margin-bottom:8px;">Collect your document</h2>
      <p style="font-size:13px;color:#527a95;margin-bottom:18px;">Your document is printing now</p>
      ${S.job?`<div style="background:#071525;border-radius:10px;padding:10px 22px;margin-bottom:22px;"><span style="font-family:'DM Mono',monospace;font-size:13px;color:#22c55e;">JOB #${S.job.jobNumber} · COMPLETE</span></div>`:''}
      <button class="kbs" id="rst" style="width:auto;padding:11px 26px;">Start Over</button>
      <p style="font-size:11px;color:#2d4d5e;margin-top:18px;">Screen resets automatically</p>
    </div>`,

  error:()=>`
    <div class="ksc" style="align-items:center;text-align:center;max-width:400px;">
      <div style="width:70px;height:70px;border-radius:50%;background:#2c0a0a;border:2px solid #ef4444;display:flex;align-items:center;justify-content:center;margin-bottom:22px;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </div>
      <h2 style="font-size:20px;font-weight:300;color:#eaf2f8;margin-bottom:10px;">Could not proceed</h2>
      <p style="font-size:13px;color:#e07070;margin-bottom:26px;font-family:'DM Mono',monospace;line-height:1.7;">${S.err}</p>
      <button class="kbp" id="rst">Try Again</button>
    </div>`
};

function reset(){S={...S,screen:'idle',code:'',job:null,err:''};render();}

async function doValidate(){
  if(S.code.length!==6)return;
  S.screen='validating';render();
  try{
    const r=await PL.validateCode(S.code);
    if(!r.valid){S.err=r.message||'Invalid code.';S.screen='error';render();return;}
    const j=await PL.getJob(S.code);
    S.job=j;S.screen='preview';render();
  }catch(e){S.err=e.message||'Network error.';S.screen='error';render();}
}

async function doPrint(){
  S.screen='printing';render();
  try{
    const r=await PL.printJob({code:S.code,printerId:S.sel,printerName:S.sel});
    S.screen=r.success?'success':'error';
    if(!r.success)S.err=r.error||'Print failed.';
    render();
  }catch(e){S.err=e.message||'Print failed.';S.screen='error';render();}
}

function render(){
  document.getElementById('sc').innerHTML=screens[S.screen]?.()??'';
  if(S.screen==='idle'){
    document.querySelectorAll('.kkey').forEach(b=>b.addEventListener('mousedown',e=>{
      e.preventDefault();const k=b.dataset.k;
      if(k==='⌫'){S.code=S.code.slice(0,-1);render();}
      else if(S.code.length<6){S.code+=k;render();if(S.code.length===6)setTimeout(doValidate,350);}
    }));
    document.getElementById('clr')?.addEventListener('click',()=>{S.code='';render();});
    document.getElementById('sub')?.addEventListener('click',doValidate);
  }
  if(S.screen==='preview'){
    document.getElementById('back-idle')?.addEventListener('click',()=>{S.screen='idle';S.code='';S.job=null;render();});
    document.getElementById('go-summary')?.addEventListener('click',()=>{S.screen='summary';render();});
  }
  if(S.screen==='summary'){
    document.getElementById('back-preview')?.addEventListener('click',()=>{S.screen='preview';render();});
    document.getElementById('confirm-print')?.addEventListener('click',doPrint);
    document.getElementById('psel')?.addEventListener('change',e=>{S.sel=e.target.value;});
  }
  if(S.screen==='success'||S.screen==='error'){
    document.getElementById('rst')?.addEventListener('click',reset);
    setTimeout(reset,9000);
  }
}

PL.getPrinters().then(list=>{
  S.printers=list;
  const d=list.find(p=>p.isDefault)||list[0];
  S.sel=d?.name||'';
  const badge=document.getElementById('pbadge');
  if(badge&&d)badge.innerHTML=`<span class="odot"></span>${d.name}`;
  render();
}).catch(()=>render());

document.addEventListener('keydown',e=>{
  if(S.screen!=='idle')return;
  const k=e.key.toUpperCase();
  if(/^[A-Z0-9]$/.test(k)&&S.code.length<6){S.code+=k;render();if(S.code.length===6)setTimeout(doValidate,350);}
  else if(e.key==='Backspace'){S.code=S.code.slice(0,-1);render();}
  else if(e.key==='Enter'&&S.code.length===6)doValidate();
});
</script>
</body>
</html>
