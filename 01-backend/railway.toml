# Railway deployment config for the PrintLoop backend.
# This sits in `01-backend/` so Railway knows how to build and run the
# Express + TypeORM server. Pair with Railway's "Root Directory" setting
# pointed at `01-backend`, or with `railway up --service printloop-api`
# from this directory.

[build]
builder = "NIXPACKS"
# Nixpacks auto-detects Node + npm. We just need to ensure tsx is on
# the path at runtime; it's a regular dependency so `npm install` covers
# it.
buildCommand = "npm install"

[deploy]
# start.sh joins the Tailscale tailnet (when TS_AUTHKEY is set) so the
# cloud backend can reach printers on the user's home LAN, then exec's
# the Node app. With TS_AUTHKEY unset it skips Tailscale and runs the
# app unconnected — the dev / e2e path.
startCommand = "bash start.sh"
healthcheckPath = "/health"
# First boot installs Tailscale (~15s download + extract) and brings up
# the tailnet link (~5-10s); only after that does the Express app
# start. Allow up to 180s — subsequent boots with cached binaries on
# the persistent volume return to ~10s startup.
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[experimental]
configAsCode = true
